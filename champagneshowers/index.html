<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0604" />
<title>Champagne Showers</title>
<meta name="description" content="A Gold Kash Group concept. Bader Field, Atlantic City." />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- =============================================
     COLD OPEN — silent black, no text
     ============================================= -->
<div class="cold-open" id="coldOpen"></div>

<!-- LOADING VEIL — silent -->
<div class="veil" id="veil"></div>

<!-- =============================================
     CINEMATIC OVERLAY LAYERS
     ============================================= -->
<div class="letterbox top" id="lbTop"></div>
<div class="letterbox bottom" id="lbBottom"></div>
<div class="grain" aria-hidden="true"></div>
<div class="flare-layer" id="flareLayer" aria-hidden="true"></div>

<!-- =============================================
     THE CINEMATIC — pure images
     ============================================= -->
<main class="film" id="film">

  <!-- ACT I -->
  <section class="scene scene-seal" data-scene="0" data-act="1" data-flare="warm">
    <div class="scene-bg seal-bg">
      <img src="images/00-seal.png" alt="" class="seal-img" />
    </div>
  </section>

  <section class="scene scene-door" data-scene="1" data-act="1">
    <div class="scene-bg ken">
      <img src="images/01-door.jpeg" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene scene-matchcut-before" data-scene="2" data-act="1" data-flare="warm">
    <div class="scene-bg matchcut-bg-before">
      <img src="images/02-chandelier.png" alt="" class="matchcut-img" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene scene-matchcut-after" data-scene="3" data-act="1" data-flare="warm">
    <div class="scene-bg ken ken-zoom-strong">
      <img src="images/03-cellar.jpeg" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="4" data-act="1">
    <div class="scene-bg ken">
      <img src="images/04-brass-lounge.jpeg" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="5" data-act="1" data-flare="warm">
    <div class="scene-bg ken">
      <img src="images/05-bar.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="6" data-act="1">
    <div class="scene-bg ken ken-slow">
      <img src="images/06-bubble-booth.jpeg" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene scene-reveal" data-scene="7" data-act="1" data-flare="strong">
    <div class="scene-bg ken">
      <img src="images/07-main-floor.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="8" data-act="1">
    <div class="scene-bg ken ken-slow">
      <img src="images/08-cube.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <!-- ACT II -->
  <section class="scene" data-scene="9" data-act="2">
    <div class="scene-bg ken">
      <img src="images/09-locker.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="10" data-act="2">
    <div class="scene-bg ken ken-zoom">
      <img src="images/10-dressing-hall.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="11" data-act="2">
    <div class="scene-bg ken">
      <img src="images/11-booth.jpeg" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="12" data-act="2" data-flare="warm">
    <div class="scene-bg ken ken-zoom-strong">
      <img src="images/12-walkway.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="13" data-act="2" data-flare="warm">
    <div class="scene-bg ken">
      <img src="images/13-dj.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <!-- ACT III -->
  <section class="scene" data-scene="14" data-act="3">
    <div class="scene-bg ken">
      <img src="images/14-suit-up.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="15" data-act="3">
    <div class="scene-bg ken">
      <img src="images/15-round-one.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="16" data-act="3">
    <div class="scene-bg ken ken-zoom">
      <img src="images/16-cork-pop.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene" data-scene="17" data-act="3" data-flare="warm">
    <div class="scene-bg ken">
      <img src="images/17-bathtub.jpeg" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene scene-climax" data-scene="18" data-act="3" data-flare="strong">
    <div class="scene-bg ken ken-zoom-strong">
      <img src="images/18-spray.png" alt="" />
    </div>
    <div class="vignette"></div>
  </section>

  <section class="scene scene-close" data-scene="19" data-act="3">
    <div class="scene-bg chandelier-bg">
      <img src="images/19-chandelier-closer.png" alt="" class="chandelier-img" />
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>

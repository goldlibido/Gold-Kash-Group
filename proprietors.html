<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proprietors | Gold Kash Group</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f7f5f0;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 60px 24px;

  overflow-x: hidden;
}

/* TOP LEFT GK ICON */

.top-nav {
  position: fixed;

  top: 22px;
  left: 22px;

  z-index: 1000;
}

.gk-link img {
  width: 34px;
  height: auto;
  display: block;

  transition: opacity 0.25s ease;
}

.gk-link:hover img {
  opacity: 0.65;
}

/* PROPRIETORS IMAGE */

.proprietors-image {
  width: 100%;
  max-width: 1100px;
  height: auto;
  display: block;
}

/* MOBILE */

@media (max-width: 768px) {

  body {
    background: #f7f5f0;
    padding: 90px 16px 40px;
  }

  .gk-link img {
    width: 28px;
  }

}

</style>

</head>

<body>

<div class="top-nav">

  <a href="index.html" class="gk-link">

    <img
      src="gold-kash-black-icon.PNG"
      alt="GK"
    >

  </a>

</div>

<img
  class="proprietors-image"
  src="proprietors.JPG"
  alt="Proprietors"
>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proprietors | Gold Kash Group</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {

  background:
    radial-gradient(circle at top, rgba(201,152,47,0.08), transparent 42%),
    linear-gradient(180deg, #0a0604 0%, #140b05 50%, #080403 100%);

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 60px 24px;

  overflow-x: hidden;
}

/* TOP LEFT GK ICON */

.top-nav {

  position: fixed;

  top: 22px;
  left: 22px;

  z-index: 1000;
}

.gk-link img {

  width: 34px;

  height: auto;

  display: block;

  transition: opacity 0.25s ease;
}

.gk-link:hover img {
  opacity: 0.65;
}

/* PROPRIETORS IMAGE */

.proprietors-image {

  width: 100%;

  max-width: 1100px;

  height: auto;

  display: block;

  box-shadow:
    0 30px 80px rgba(0,0,0,0.6);
}

/* MOBILE */

@media (max-width: 768px) {

  body {
    padding: 90px 16px 40px;
  }

  .gk-link img {
    width: 28px;
  }

}

</style>

</head>

<body>

<!-- GK ICON -->

<div class="top-nav">

  <a href="index.html" class="gk-link">

    <img
      src="gold-kash-white-icon.PNG"
      alt="GK"
    >

  </a>

</div>

<!-- PROPRIETORS IMAGE -->

<img
  class="proprietors-image"
  src="proprietors.JPG"
  alt="Proprietors"
>

</body>
</html>
